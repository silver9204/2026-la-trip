<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="2026 LA 가족여행 모바일 일정 가이드" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <title>2026 LA 가족여행</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=16" />
  </head>
  <body>
    <a class="skip-link" href="#app">본문 바로가기</a>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="#home" aria-label="여행 홈으로">
          <span class="brand-mark">LA</span>
          <span>
            <b>Family Trip</b>
            <small>2026. 7. 24 — 8. 3</small>
          </span>
        </a>
        <button class="day-picker-button" id="dayPickerButton" type="button" aria-haspopup="dialog">
          Day 선택
        </button>
      </header>

      <main id="app" tabindex="-1" aria-live="polite"></main>

      <nav class="bottom-nav" aria-label="주요 메뉴">
        <a href="#home" data-nav="home"><span>⌂</span>홈</a>
        <a href="#days" data-nav="days"><span>▤</span>일정</a>
        <a href="https://www.google.com/maps/d/viewer?mid=1HDBAhbqSJALyHLK1yXfpzf2gUGklVGo" target="_blank" rel="noopener"><span>⌖</span>지도</a>
        <a href="#info" data-nav="info"><span>●</span>여행정보</a>
      </nav>
    </div>

    <dialog class="day-dialog" id="dayDialog" aria-labelledby="dayDialogTitle">
      <div class="dialog-head">
        <div>
          <small>빠른 이동</small>
          <h2 id="dayDialogTitle">날짜 선택</h2>
        </div>
        <button id="closeDayDialog" type="button" aria-label="닫기">×</button>
      </div>
      <div class="dialog-days" id="dialogDays"></div>
    </dialog>

    <noscript>이 여행 가이드는 JavaScript를 사용합니다.</noscript>
    <script src="./app.js?v=16"></script>
  </body>
</html>
